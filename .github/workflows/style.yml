name: Style (fmt + lint)

# Keep every Kestrel source in this repo formatted and lint-clean, checked with a
# real released `kestrel` binary. Runs on every push and PR so drift is caught
# immediately (unlike the release-triggered verify workflow). No LLVM needed —
# `kestrel fmt` and `kestrel lint` are front-end only.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download the latest Kestrel release binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="kestrel-build/kestrel"
          TAG="$(gh release list --repo "$REPO" --limit 1 --json tagName -q '.[0].tagName')"
          [ -n "$TAG" ] || { echo "no release found"; exit 1; }
          echo "Using release: $TAG"
          gh release download "$TAG" --repo "$REPO" \
            -p 'kestrel-linux-x86_64' -p 'SHA256SUMS' -D dl
          ( cd dl && grep 'kestrel-linux-x86_64' SHA256SUMS | sha256sum -c - )
          sudo install -m 0755 dl/kestrel-linux-x86_64 /usr/local/bin/kestrel

      - name: Check formatting and lints
        run: |
          chmod +x check-style.sh
          KESTREL=kestrel ./check-style.sh
